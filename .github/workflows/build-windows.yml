name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build app with PyInstaller
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --windowed `
            --name "WordCloudGenerator" `
            --icon "assets/icon.ico" `
            --add-data "streamlit_app.py;." `
            --add-data "masks;masks" `
            --add-data "assets;assets" `
            --collect-data streamlit `
            --collect-submodules streamlit `
            --copy-metadata streamlit `
            --collect-all wordcloud `
            --exclude-module IPython `
            --exclude-module ipykernel `
            --exclude-module jupyter `
            --exclude-module notebook `
            --exclude-module scipy `
            --exclude-module sklearn `
            --exclude-module torch `
            --exclude-module tensorflow `
            --exclude-module cv2 `
            --exclude-module seaborn `
            --exclude-module plotly `
            launcher.py

      - name: Zip portable app
        run: |
          Compress-Archive `
            -Path "dist/WordCloudGenerator/*" `
            -DestinationPath "WordCloudGenerator-Windows.zip" `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordCloudGenerator-Windows
          path: WordCloudGenerator-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "WordCloudGenerator-Windows.zip" `
            --title "WordCloudGenerator ${{ github.ref_name }}" `
            --notes "Portable Windows release. Download the ZIP, extract it, and run WordCloudGenerator.exe. No Python installation required."